<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Tours</title>

<style>
body { font-family: Arial; margin: 0; background: #f4f4f4; }

header {
    background: #0077b6;
    color: white;
    padding: 20px;
    text-align: center;
}

nav {
    display: flex;
    justify-content: center;
    background: #023e8a;
}

nav button {
    background: none;
    border: none;
    color: white;
    padding: 15px;
    cursor: pointer;
}

nav button:hover { background: #0077b6; }

section { display: none; padding: 20px; }
.active { display: block; }

.card {
    background: white;
    padding: 15px;
    margin: 15px 0;
    border-radius: 10px;
}

.gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
    gap: 10px;
}

.gallery img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
}

iframe {
    width: 100%;
    height: 300px;
    border-radius: 10px;
}
</style>

<script>
function showSection(id) {
    document.querySelectorAll("section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// 🔥 Detectar error del video y mostrar imágenes
function videoError(idVideo, idGallery) {
    document.getElementById(idVideo).style.display = "none";
    document.getElementById(idGallery).style.display = "grid";
}
</script>

</head>

<body>

<header>
    <h1>🌍 World Tours</h1>
</header>

<nav>
    <button onclick="showSection('china')">China</button>
    <button onclick="showSection('france')">France</button>
</nav>

<!-- CHINA -->
<section id="china" class="active">

<div class="card">
    <h2>China 🇨🇳</h2>
    <p><b>Airlines:</b> Air China</p>
    <p><b>Food:</b> Dumplings, Peking Duck</p>
    <p><b>Customs:</b> Tea culture</p>
</div>

<!-- VIDEO -->
<div class="card" id="videoChina">
<iframe 
    src="https://www.youtube.com/embed/1wY3Fz0zS9g"
    onerror="videoError('videoChina','galleryChina')"
    allowfullscreen>
</iframe>
</div>

<!-- GALERÍA (OCULTA POR DEFECTO) -->
<div class="gallery" id="galleryChina" style="display:none;">
    <img src="https://picsum.photos/400/300?random=1">
    <img src="https://picsum.photos/400/300?random=2">
    <img src="https://picsum.photos/400/300?random=3">
</div>

</section>

<!-- FRANCE -->
<section id="france">

<div class="card">
    <h2>France 🇫🇷</h2>
    <p><b>Food:</b> Croissants</p>
</div>

<div class="card" id="videoFrance">
<iframe 
    src="https://www.youtube.com/embed/Scxs7L0vhZ4"
    onerror="videoError('videoFrance','galleryFrance')"
    allowfullscreen>
</iframe>
</div>

<div class="gallery" id="galleryFrance" style="display:none;">
    <img src="https://picsum.photos/400/300?random=4">
    <img src="https://picsum.photos/400/300?random=5">
    <img src="https://picsum.photos/400/300?random=6">
</div>

</section>

</body>
</html>
