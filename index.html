<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Tours Booking</title>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f8f9fa;}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 30px;background:white;box-shadow:0 2px 5px rgba(0,0,0,0.1);}
header h1{color:#ff385c;}
.search-bar input{padding:10px;border-radius:20px;border:1px solid #ccc;margin:5px;}
.hero{background:#333;height:300px;display:flex;align-items:center;justify-content:center;color:white;font-size:30px;}
.container{padding:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px;}
.card{background:white;border-radius:15px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.card img{width:100%;height:180px;object-fit:cover;}
.card-content{padding:15px;}
.price{color:#ff385c;font-weight:bold;}
button{background:#ff385c;color:white;border:none;padding:10px;border-radius:8px;cursor:pointer;}
.modal{display:none;position:fixed;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;}
.modal-content{background:white;padding:20px;border-radius:10px;width:90%;max-width:600px;}
iframe{margin-top:10px;border-radius:10px;}
footer{text-align:center;padding:15px;background:#222;color:white;}
</style>

<script>
function openModal(country, video){
document.getElementById("modal").style.display="flex";
document.getElementById("modalText").innerHTML=country;
document.getElementById("modalVideo").src=video;
}
function closeModal(){
document.getElementById("modal").style.display="none";
document.getElementById("modalVideo").src="";
}
</script>

</head>

<body>

<header>
<h1>🌍 WorldBooking</h1>
<div class="search-bar">
<input type="text" placeholder="Destination">
<input type="date">
<input type="date">
</div>
</header>

<div class="hero">Find your next destination ✈️</div>

<div class="container">
<h2>Popular Destinations</h2>

<div class="grid">

<!-- CHINA -->
<div class="card">
<img src="https://picsum.photos/400/300?random=1">
<div class="card-content">
<h3>China 🇨🇳</h3>
<p>Airlines: Air China</p>
<p class="price">$1200</p>
<button onclick="openModal('China Tour','https://www.youtube.com/embed/kJQP7kiw5Fk')">View</button>
</div>
</div>

<!-- FRANCE -->
<div class="card">
<img src="https://picsum.photos/400/300?random=2">
<div class="card-content">
<h3>France 🇫🇷</h3>
<p>Airlines: Air France</p>
<p class="price">$1500</p>
<button onclick="openModal('France Tour','https://www.youtube.com/embed/3JZ_D3ELwOQ')">View</button>
</div>
</div>

<!-- USA -->
<div class="card">
<img src="https://picsum.photos/400/300?random=3">
<div class="card-content">
<h3>USA 🇺🇸</h3>
<p>Airlines: Delta</p>
<p class="price">$1000</p>
<button onclick="openModal('USA Tour','https://www.youtube.com/embed/L_jWHffIx5E')">View</button>
</div>
</div>

</div>
</div>

<div id="modal" class="modal" onclick="closeModal()">
<div class="modal-content" onclick="event.stopPropagation()">
<h2>Tour Details</h2>
<p id="modalText"></p>
<iframe id="modalVideo" width="100%" height="300" allowfullscreen></iframe>
</div>
</div>

<footer>
<p>Working 100% ✔</p>
</footer>

</body>
</html>
